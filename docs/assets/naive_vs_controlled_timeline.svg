<svg xmlns="http://www.w3.org/2000/svg" width="960" height="524" viewBox="0 0 960 524" role="img" aria-labelledby="t d">
  <title id="t">Naive vs controlled p95 latency during a CPU-stress fault</title>
  <desc id="d">p95 latency over a 90-second run on Raspberry Pi 5. A CPU-stress fault runs from 21 to 50 seconds. Naive stays pinned above the 200 ms SLO; the controller switches to Lightning, recovers below the SLO, briefly returns to Thunder mid-fault, then settles after the fault clears. One run per mode.</desc>
  <rect width="960" height="524" fill="#f6f8f8"/>
  <text x="40" y="44" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#16241f">Under load, the controller recovers &#8212; naive stays stuck</text>
  <text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#56635f">p95 latency over a 90-second run &#183; Raspberry Pi 5 &#183; one run per mode.</text>
  <rect x="70" y="110" width="850" height="320" fill="#ffffff" stroke="#e3e9e7"/>
  <line x1="70" y1="430.0" x2="920" y2="430.0" stroke="#eef2f0"/><text x="62" y="434.0" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">0</text><line x1="70" y1="357.3" x2="920" y2="357.3" stroke="#eef2f0"/><text x="62" y="361.3" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">50</text><line x1="70" y1="284.5" x2="920" y2="284.5" stroke="#eef2f0"/><text x="62" y="288.5" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">100</text><line x1="70" y1="211.8" x2="920" y2="211.8" stroke="#eef2f0"/><text x="62" y="215.8" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">150</text><line x1="70" y1="139.1" x2="920" y2="139.1" stroke="#eef2f0"/><text x="62" y="143.1" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">200</text>
  <text x="495.0" y="468" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#56635f">seconds into run</text>
  <text x="22" y="270" text-anchor="middle" transform="rotate(-90 22 270)" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#56635f">p95 latency (ms)</text>
  <text x="70.0" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">0</text><text x="211.7" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">15</text><text x="353.3" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">30</text><text x="495.0" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">45</text><text x="636.7" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">60</text><text x="778.3" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">75</text><text x="920.0" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">90</text>
  <rect x="268.3" y="110" width="273.9" height="320" fill="#d23f3f" opacity="0.07"/>
  <text x="405.3" y="422" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#b5462f">CPU-stress fault (21&#8211;50 s)</text>
  <line x1="70" y1="139.1" x2="920" y2="139.1" stroke="#d23f3f" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="916" y="133.1" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#c0392b">200 ms SLO</text>
