<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="t d">
  <title id="t">Naive vs controlled p95 latency and FPS during a CPU-stress fault</title>
  <desc id="d">Two stacked time series over a 90-second run on Raspberry Pi 5, with a CPU-stress fault from 21 to 50 seconds. Top: p95 latency; naive stays above the 200 ms SLO while the controller drops to Lightning and recovers. Bottom: FPS; the controller holds frame rate around 20 while naive collapses to about 6. One run per mode.</desc>
  <rect width="960" height="600" fill="#f6f8f8"/>
  <text x="40" y="44" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#16241f">Under load, the controller recovers &#8212; naive stays stuck</text>
  <text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#56635f">p95 latency and FPS over a 90-second run &#183; Raspberry Pi 5 &#183; one run per mode.</text>

