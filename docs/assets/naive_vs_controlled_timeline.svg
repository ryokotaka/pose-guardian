  <text x="40" y="512" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7c8682">One run per mode. The controller even recovered to Thunder mid-fault (~34 s) before degrading again &#8212; a recovery-tuning target noted in the README.</text>
</svg>