  <g font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#45524f">
    <line x1="70" y1="488" x2="98" y2="488" stroke="#9aa6b2" stroke-width="3"/><text x="104" y="492">naive (fixed Thunder)</text>
    <line x1="240" y1="488" x2="268" y2="488" stroke="#3f72d4" stroke-width="3"/><text x="274" y="492">controlled</text>
    <polygon points="372,484 384,484 378,493" fill="#c9882f"/><text x="390" y="492">&#8594; Lightning</text>
    <polygon points="492,493 504,493 498,484" fill="#1f9d76"/><text x="510" y="492">&#8594; Thunder</text>
